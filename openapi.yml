components:
  schemas:
    ApiError:
      type: object
      required:
      - code
      - message
      properties:
        code:
          type: integer
          format: int32
        message:
          type: string
    ClusterOverview:
      type: object
      required:
      - nodeCount
      - healthyNodes
      - totalCpuMilli
      - allocatableCpuMilli
      - totalMemoryMB
      - allocatableMemoryMB
      - maxMvmSlots
      properties:
        allocatableCpuMilli:
          type: integer
          format: int64
          description: Currently-allocatable CPU in millicpu.
        allocatableMemoryMB:
          type: integer
          format: int64
          description: Currently-allocatable memory in MiB.
        healthyNodes:
          type: integer
          minimum: 0
        maxMvmSlots:
          type: integer
          format: int64
          description: Sum of every node's maximum MVM slots.
        nodeCount:
          type: integer
          minimum: 0
        totalCpuMilli:
          type: integer
          format: int64
          description: Total CPU across the cluster, expressed in millicpu.
        totalMemoryMB:
          type: integer
          format: int64
          description: Total memory in MiB.
    ComponentMatrixRowView:
      type: object
      description: Per-component aggregation across all nodes.
      required:
      - component
      - consistent
      - versions
      properties:
        component:
          type: string
        consistent:
          type: boolean
        declaredVersion:
          type: string
        declaredVersions:
          type: array
          items:
            type: string
        versions:
          type: array
          items:
            $ref: '#/components/schemas/ComponentVersionGroupView'
    ComponentVersionGroupView:
      type: object
      description: A group of nodes that report the same version of a component.
      required:
      - version
      - nodes
      properties:
        nodes:
          type: array
          items:
            type: string
        version:
          type: string
    ComponentVersionView:
      type: object
      description: One component's version on a node.
      required:
      - component
      properties:
        buildTime:
          type: string
        commit:
          type: string
        component:
          type: string
        source:
          type: string
        version:
          type: string
    ControlPlaneVersionView:
      type: object
      description: Control-plane reference version (the cluster's target version).
      required:
      - version
      properties:
        buildTime:
          type: string
        commit:
          type: string
        version:
          type: string
