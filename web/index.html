<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/assets/cube-logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CubeSandbox · Dashboard</title>
    <script>
      (function () {
        try {
          var m = localStorage.getItem('cube-theme') || 'system';
          var isDark =
            m === 'dark' ||
            (m === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
          var cls = isDark ? 'dark' : 'light';
          document.documentElement.classList.add(cls);
          document.documentElement.style.colorScheme = cls;
        } catch (e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
