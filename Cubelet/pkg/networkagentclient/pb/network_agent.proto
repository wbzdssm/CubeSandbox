syntax = "proto3";

package network_agent.api.v1;

option go_package = "github.com/tencentcloud/CubeSandbox/network-agent/api/v1;networkagentv1";

service NetworkAgent {
  // Ensure the target sandbox reaches desired network state.
  rpc EnsureNetwork(EnsureNetworkRequest) returns (EnsureNetworkResponse);

  // Release all resources associated with a network handle/sandbox.
  rpc ReleaseNetwork(ReleaseNetworkRequest) returns (ReleaseNetworkResponse);

  // Reconcile observed state back to desired spec.
  rpc ReconcileNetwork(ReconcileNetworkRequest) returns (ReconcileNetworkResponse);

  // Get latest known network state for a sandbox/handle.
  rpc GetNetwork(GetNetworkRequest) returns (GetNetworkResponse);

  // Basic liveness/readiness probe.
  rpc Health(HealthRequest) returns (HealthResponse);

  // List all managed network states.
  rpc ListNetworks(ListNetworksRequest) returns (ListNetworksResponse);
}

message EnsureNetworkRequest {
  string sandbox_id = 1;
  string idempotency_key = 2;
  repeated Interface interfaces = 3;
  repeated Route routes = 4;
  repeated ARPNeighbor arp_neighbors = 5;
  repeated PortMapping port_mappings = 6;
  map<string, string> persist_metadata = 7;
  optional CubeNetworkConfig cube_network_config = 8;
}

message EnsureNetworkResponse {
  string sandbox_id = 1;
  string network_handle = 2;
  repeated Interface interfaces = 3;
  repeated Route routes = 4;
  repeated ARPNeighbor arp_neighbors = 5;
  repeated PortMapping port_mappings = 6;
  map<string, string> persist_metadata = 7;
}

message ReleaseNetworkRequest {
  string sandbox_id = 1;
  string network_handle = 2;
  string idempotency_key = 3;
  map<string, string> persist_metadata = 4;
}

message ReleaseNetworkResponse {
  bool released = 1;
  map<string, string> persist_metadata = 2;
}

message ReconcileNetworkRequest {
  string sandbox_id = 1;
  string network_handle = 2;
  string idempotency_key = 3;
  repeated Interface interfaces = 4;
  repeated Route routes = 5;
  repeated ARPNeighbor arp_neighbors = 6;
  repeated PortMapping port_mappings = 7;
  map<string, string> persist_metadata = 8;
  optional CubeNetworkConfig cube_network_config = 9;
}

message ReconcileNetworkResponse {
  string sandbox_id = 1;
  string network_handle = 2;
  bool converged = 3;
  repeated Interface interfaces = 4;
  repeated Route routes = 5;
  repeated ARPNeighbor arp_neighbors = 6;
  repeated PortMapping port_mappings = 7;
  map<string, string> persist_metadata = 8;
}

message GetNetworkRequest {
  string sandbox_id = 1;
  string network_handle = 2;
}

message GetNetworkResponse {
  string sandbox_id = 1;
  string network_handle = 2;
  repeated Interface interfaces = 3;
  repeated Route routes = 4;
  repeated ARPNeighbor arp_neighbors = 5;
  repeated PortMapping port_mappings = 6;
  map<string, string> persist_metadata = 7;
}

message HealthRequest {
  string sandbox_id = 1;
}

message HealthResponse {
  bool ok = 1;
  string status = 2;
}

message ListNetworksRequest {}

message ListNetworksResponse {
  repeated NetworkState networks = 1;
}

message NetworkState {
  string sandbox_id = 1;
  string network_handle = 2;
  string tap_name = 3;
  int32 tap_ifindex = 4;
  string sandbox_ip = 5;
  repeated PortMapping port_mappings = 6;
}

message PortMapping {
  string protocol = 1;
  uint32 container_port = 2;
  uint32 host_port = 3;
  string host_ip = 4;
}

message Interface {
  string name = 1;
  string mac_address = 2;
  repeated string ip_cidrs = 3;
  string gateway = 4;
  int32 mtu = 5;
}

message Route {
  string destination_cidr = 1;
  string gateway = 2;
  string device = 3;
}

message ARPNeighbor {
  string ip = 1;
  string mac_address = 2;
  string device = 3;
}

message CubeNetworkConfig {
  optional bool allow_internet_access = 1;
  repeated string allow_out = 2;
  repeated string deny_out = 3;
  // L7 egress rules, evaluated first-match-wins in list order.
  repeated EgressRule rules = 4;
}

message EgressRule {
  string name = 1;
  optional EgressRuleMatch match = 2;
  optional EgressRuleAction action = 3;
}

message EgressRuleMatch {
  optional string sni = 1;
  optional string host = 3;
  repeated string method = 4;
  optional string path = 5;
  optional string scheme = 7;
}

message EgressRuleAction {
  bool allow = 1;
  optional string audit = 2;
  repeated EgressRuleInject inject = 3;
}

message EgressRuleInject {
  string header = 1;
  string secret = 2;
  optional string format = 3;
}
