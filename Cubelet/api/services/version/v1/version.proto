syntax = "proto3";

package cubelet.services.version.v1;

import "google/protobuf/empty.proto";


option go_package = "github.com/tencentcloud/CubeSandbox/Cubelet/api/services/version/v1;version";

service Version {
  rpc Version(google.protobuf.Empty) returns (VersionResponse);
}

message VersionResponse {
  string version = 1;
  string revision = 2;
}