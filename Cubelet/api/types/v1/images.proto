syntax = "proto3";

package cubelet.types;

// import "google/protobuf/any.proto";
option go_package = "github.com/tencentcloud/CubeSandbox/Cubelet/api/types/v1;types";

// AuthConfig contains authorization information for connecting to a registry.
message AuthConfig {
    string username = 1;
    string password = 2;
    string auth = 3;
    string serverAddress = 4;
    // IdentityToken is used to authenticate the user and get
    // an access token for the registry.
    string identityToken = 5;
    // RegistryToken is a bearer token to be sent to a registry
    string registryToken = 6;
}

message ImageFilter {
    // Spec of the image.
    ImageSpec image = 1;
}

// ImageSpec is an internal representation of an image.
message ImageSpec {
    // Container's Image field (e.g. imageID or imageDigest).
    string image = 1;
    // Unstructured key-value map holding arbitrary metadata.
    // ImageSpec Annotations can be used to help the runtime target specific
    // images in multi-arch images.
    map<string, string> annotations = 2;
}


// Basic information about a container image.
message Image {
    // ID of the image.
    string id = 1;
    // Other names by which this image is known.
    repeated string repoTags = 2;
    // Digests by which this image is known.
    repeated string repoDigests = 3;
    // Size of the image in bytes. Must be > 0.
    uint64 size = 4;
    // UID that will run the command(s). This is used as a default if no user is
    // specified when creating the container. UID and the following user name
    // are mutually exclusive.
    Int64Value uid = 5;
    // User name that will run the command(s). This is used if UID is not set
    // and no user is specified when creating container.
    string username = 6;
    // ImageSpec for image which includes annotations
    ImageSpec spec = 7;
    // Recommendation on whether this image should be exempt from garbage collection.
    // It must only be treated as a recommendation -- the client can still request that the image be deleted,
    // and the runtime must oblige.
    bool pinned = 8;

    // namespace of image, this field is used for cube image management.
    string namespace = 9;
}

// Int64Value is the wrapper of int64.
message Int64Value {
    // The value.
    int64 value = 1;
}