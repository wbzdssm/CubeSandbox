{{- if .Values.diagnostics.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "cube.fullname" . }}-diagnostics
  labels:
    {{- include "cube.labels" . | nindent 4 }}
    app.kubernetes.io/component: diagnostics
data:
  cube-diag-k8s.sh: |-
    #!/bin/sh
    set -eu

    NS="${1:-{{ .Release.Namespace }}}"
    RELEASE="${2:-{{ .Release.Name }}}"
    OUT="${3:-cube-diag-${RELEASE}-$(date +%Y%m%d%H%M%S)}"

    mkdir -p "${OUT}"

    run() {
      name="$1"
      shift
      echo "==> ${name}"
      {
        echo "# ${name}"
        echo "# $*"
        "$@"
      } > "${OUT}/${name}.txt" 2>&1 || true
    }

    run pods kubectl get pods -n "${NS}" -o wide
    run daemonsets kubectl get daemonsets -n "${NS}" -o wide
    run deployments kubectl get deployments -n "${NS}" -o wide
