{{- if and (eq (include "cube.proxyEnabled" .) "true") .Values.cubeProxy.ingress.enabled }}
{{- $hosts := .Values.cubeProxy.ingress.hosts -}}
{{- if not $hosts -}}
{{- $hosts = list .Values.cubeProxy.domain (printf "*.%s" .Values.cubeProxy.domain) -}}
{{- end }}
{{- /* HTTPS / TLS passthrough → CubeProxy :https (TLS terminates in CubeProxy). */}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "cube.proxyName" . }}
  labels:
    {{- include "cube.labels" . | nindent 4 }}
    app.kubernetes.io/component: cube-proxy
  {{- with .Values.cubeProxy.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.cubeProxy.ingress.className }}
  ingressClassName: {{ . | quote }}
  {{- end }}
  {{- with .Values.cubeProxy.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    {{- range $hosts }}
    - host: {{ . | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "cube.proxyName" $ }}
                port:
                  name: https
    {{- end }}
---
{{- /* Cleartext HTTP → CubeProxy :http (no ssl-passthrough annotations). */}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "cube.proxyName" . }}-http
  labels:
    {{- include "cube.labels" . | nindent 4 }}
    app.kubernetes.io/component: cube-proxy
  {{- with .Values.cubeProxy.ingress.className }}
  {{- /* intentionally no ssl-passthrough annotations */}}
  {{- end }}
spec:
  {{- with .Values.cubeProxy.ingress.className }}
  ingressClassName: {{ . | quote }}
  {{- end }}
  rules:
    {{- range $hosts }}
    - host: {{ . | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "cube.proxyName" $ }}
                port:
                  name: http
    {{- end }}
{{- end }}
