apiVersion: v1
kind: Service
metadata:
  name: {{ include "cube.lifecycleManagerName" . }}
  labels:
    {{- include "cube.labels" . | nindent 4 }}
    app.kubernetes.io/component: lifecycle-manager
  {{- with .Values.lifecycleManager.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: ClusterIP
  selector:
    {{- include "cube.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: lifecycle-manager
  ports:
    - name: http
      port: {{ .Values.lifecycleManager.service.port }}
      targetPort: http
      protocol: TCP
{{- end }}
