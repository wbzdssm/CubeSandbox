    - name: http-api
      port: {{ .Values.controlPlane.api.service.port }}
      targetPort: http-api
{{- if .Values.controlPlane.api.internalLoadBalancer.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "cube.apiName" . }}-internal
  labels:
    {{- include "cube.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
  annotations:
    {{- toYaml .Values.controlPlane.api.internalLoadBalancer.annotations | nindent 4 }}
spec:
  type: LoadBalancer
  selector:
    {{- include "cube.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
  ports:
    - name: http-api
      protocol: TCP
      port: {{ .Values.controlPlane.api.internalLoadBalancer.port }}
      targetPort: http-api
{{- end }}
{{- end }}
