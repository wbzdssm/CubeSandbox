user root;
worker_processes 12;
worker_cpu_affinity auto;
worker_rlimit_nofile 100000;

error_log /data/log/cube-proxy/error.log notice;
daemon off;

events {
    use epoll;
    worker_connections 100000;
}

http {
    include mime.types;
    lua_package_path "/usr/local/openresty/nginx/lua/?.lua;;";
    default_type application/octet-stream;

    # do NOT change log format
    log_format access '$access_time||$host||$http_X_Real_IP||$http_x_forwarded_for||$server_addr||'
    '$http_x_forwarded_proto||$request_method||$request_uri||$args||$server_protocol||$uri||'
    '$status||$body_bytes_sent||$request_time||$connection_requests||'
    '$upstream_addr||$upstream_status||$upstream_response_time||$http_user_agent||'
    '$http_x_cube_request_id||$http_x_cube_instance_id||$cube_retcode||$backend_ip';

    access_log /data/log/cube-proxy/access.log access;

    server_tokens off;
    server_names_hash_bucket_size 512;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    keepalive_timeout 75;
    keepalive_requests 10000;

    add_header Vary Accept-Encoding;

    ssi off;
    ssi_silent_errors on;
    ssi_types text/xml application/javascript application/atom+xml application/rss+xml;

    gzip on;
    gzip_vary on;
    gzip_http_version 1.0;
    gzip_min_length 1000;
    gzip_proxied any;
    gzip_buffers 4 64k;
    gzip_comp_level 3;
    gzip_types text/plain text/css text/xml application/x-javascript application/xml application/json;
    gzip_disable "MSIE [1-6]\.";

    output_buffers 16 64k;
    postpone_output 1460;

    log_subrequest on;

    large_client_header_buffers 4 512k;
    client_body_buffer_size 1M;
    client_max_body_size 256M;
    proxy_buffering on;
    proxy_buffer_size 16k;
    proxy_buffers 8 64k;
    proxy_busy_buffers_size 128k;
    proxy_intercept_errors on;

    proxy_temp_file_write_size 128k;
    proxy_temp_path /data/;
    proxy_cache_path /cache levels=2:2 keys_zone=cache:128m max_size=512m inactive=15m;
    proxy_next_upstream_tries 2;
    proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;

    underscores_in_headers on;

    upstream backend {
        server 0.0.0.1:1234;
        balancer_by_lua_file lua/balancer_phase.lua;
        keepalive 1500;
        keepalive_timeout 80;
    }

    lua_shared_dict local_cache 100m;
    init_worker_by_lua_file lua/init_worker_phase.lua;

    server {
        listen 8081 reuseport;
        server_name _;
        set $cube_proxy_host_ip "";
        # Populated by lua/path_rewrite_phase.lua for the /sandbox/<id>/<port>/ location.
        # Declared at the server level so proxy_redirect / proxy_cookie_path can reference them.
        set $ins_id "";
        set $container_port "";

        # Path-based routing: /sandbox/<sandbox-id>/<container-port>/<rest>
        # Lets clients reach a sandbox via a plain IP+port without wildcard DNS or TLS.
        location ^~ /sandbox/ {
            include /usr/local/openresty/nginx/conf/global/global.conf;
            set $cube_retcode "310200";
            set $garyscale_test "none";
            set $backend_ip "";
            set $backend_port "";
            set $access_time "";
            set $host_proxy_port 8081;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_send_timeout 7206s;
            proxy_read_timeout 7206s;
            proxy_connect_timeout 3s;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Prefix /sandbox/$ins_id/$container_port;

            # Rewrite root-relative Location headers and cookie Path values back
            # under the /sandbox/<id>/<port>/ prefix so the client stays scoped.
            proxy_redirect    ~^/(.*)$  /sandbox/$ins_id/$container_port/$1;
            proxy_cookie_path /         /sandbox/$ins_id/$container_port/;

            rewrite_by_lua_file lua/path_rewrite_phase.lua;

            proxy_pass http://backend;

            header_filter_by_lua_file lua/header_filter_phase.lua;

            log_by_lua_file lua/log_phase.lua;
        }

        location / {
            include /usr/local/openresty/nginx/conf/global/global.conf;
            set $cube_retcode "310200";
            set $garyscale_test "none";
            set $backend_ip "";
            set $backend_port "";
            set $access_time "";
            set $host_proxy_port 8081;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_send_timeout 7206s;
            proxy_read_timeout 7206s;
            proxy_connect_timeout 3s;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            rewrite_by_lua_file lua/rewrite_phase.lua;

            proxy_pass http://backend;

            header_filter_by_lua_file lua/header_filter_phase.lua;

            log_by_lua_file lua/log_phase.lua;
        }
    }

    server {
        listen 8080 ssl reuseport;
        server_name _;
        set $cube_proxy_host_ip "";
        # Populated by lua/path_rewrite_phase.lua for the /sandbox/<id>/<port>/ location.
        # Declared at the server level so proxy_redirect / proxy_cookie_path can reference them.
        set $ins_id "";
        set $container_port "";
        ssl_certificate     /usr/local/openresty/nginx/certs/cube.app+3.pem;
        ssl_certificate_key /usr/local/openresty/nginx/certs/cube.app+3-key.pem;

        # Path-based routing: /sandbox/<sandbox-id>/<container-port>/<rest>
        # Lets clients reach a sandbox via a plain IP+port without wildcard DNS or TLS.
        location ^~ /sandbox/ {
            include /usr/local/openresty/nginx/conf/global/global.conf;
            set $cube_retcode "310200";
            set $garyscale_test "none";
            set $backend_ip "";
            set $backend_port "";
            set $access_time "";
            set $host_proxy_port 8080;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_send_timeout 7206s;
            proxy_read_timeout 7206s;
            proxy_connect_timeout 3s;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Prefix /sandbox/$ins_id/$container_port;

            # Rewrite root-relative Location headers and cookie Path values back
            # under the /sandbox/<id>/<port>/ prefix so the client stays scoped.
            proxy_redirect    ~^/(.*)$  /sandbox/$ins_id/$container_port/$1;
            proxy_cookie_path /         /sandbox/$ins_id/$container_port/;

            rewrite_by_lua_file lua/path_rewrite_phase.lua;

            proxy_pass http://backend;

            header_filter_by_lua_file lua/header_filter_phase.lua;

            log_by_lua_file lua/log_phase.lua;
        }

        location / {
            include /usr/local/openresty/nginx/conf/global/global.conf;
            set $cube_retcode "310200";
            set $garyscale_test "none";
            set $backend_ip "";
            set $backend_port "";
            set $access_time "";
            set $host_proxy_port 8080;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_send_timeout 7206s;
            proxy_read_timeout 7206s;
            proxy_connect_timeout 3s;

            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            rewrite_by_lua_file lua/rewrite_phase.lua;

            proxy_pass http://backend;

            header_filter_by_lua_file lua/header_filter_phase.lua;

            log_by_lua_file lua/log_phase.lua;
        }
    }
}
