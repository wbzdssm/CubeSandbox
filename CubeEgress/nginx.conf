user cube-proxy cube-proxy;

worker_processes 2;

pid /var/run/openresty/nginx.pid;

error_log /dev/stderr info;

worker_rlimit_nofile 65535;

env CUBE_EGRESS_BOOTSTRAP_URL;
env CUBE_EGRESS_DEBUG_DUMP;

events {
    worker_connections 16384;
    use epoll;
    multi_accept on;
}

http {
    tcp_nodelay   on;
    server_tokens off;
    more_clear_headers Server;
    lua_shared_dict cert_cache 64m;
    lua_shared_dict cert_locks 8m;
    lua_shared_dict policy_store 16m;
    lua_shared_dict meta_store 1m;
    # ---- Lua ----
    lua_package_path "/usr/local/openresty/site/lualib/?.lua;/usr/local/openresty/nginx/lua/?.lua;;";

    init_by_lua_block {
        local ok, err = pcall(function()
            cert_signer = require("cert_signer")
            cert_signer.bootstrap({
                ca_cert_path = "/etc/cube/ca/cube-root-ca.crt",
                ca_key_path  = "/etc/cube/ca/cube-root-ca.key",
                leaf_ttl_sec = 7 * 24 * 3600,
                cache_ttl_sec = 6 * 24 * 3600,
            })
            audit = require("audit")
            audit.bootstrap({
                file_path = "/data/log/cube-egress/access.jsonl",
            })
            require("policy")
        end)
        if not ok then
            ngx.log(ngx.EMERG, "init failed: ", err)
            os.exit(1)
        end
    }

    init_worker_by_lua_block {
        audit.init_worker()
        require("init_worker_phase")
    }

    log_format main_json escape=json
        '{'
            '"ts":"$time_iso8601",'
            '"sandbox_ip":"$remote_addr",'
            '"dst_ip":"$server_addr",'
            '"dst_port":$server_port,'
            '"scheme":"$scheme",'
            '"host":"$cube_audit_host",'
            '"method":"$request_method",'
            '"path":"$request_uri",'
            '"status":$status,'
            '"bytes_in":$request_length,'
            '"bytes_out":$bytes_sent,'
            '"latency_ms":$cube_latency_ms,'
            '"tls_version":"$ssl_protocol",'
            '"cipher":"$ssl_cipher",'
            '"upstream_status":"$upstream_status",'
            '"upstream_addr":"$upstream_addr"'
        '}';
    access_log /dev/stdout main_json;

    client_body_temp_path /var/run/openresty/client_body_temp;
    proxy_temp_path       /var/run/openresty/proxy_temp;
    fastcgi_temp_path     /var/run/openresty/fastcgi_temp;
    uwsgi_temp_path       /var/run/openresty/uwsgi_temp;
    scgi_temp_path        /var/run/openresty/scgi_temp;

    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_buffering on;
    proxy_request_buffering on;

    proxy_buffer_size       32k;
    proxy_buffers           8 32k;
    proxy_busy_buffers_size 64k;
    proxy_temp_file_write_size 64k;

    proxy_ssl_trusted_certificate /etc/ssl/certs/ca-certificates.crt;
    proxy_ssl_verify on;
    proxy_ssl_verify_depth 4;
    proxy_ssl_session_reuse on;
    proxy_ssl_protocols TLSv1.2 TLSv1.3;
    proxy_ssl_server_name on;

    client_max_body_size 0;
    client_body_buffer_size 64k;
    client_header_timeout 30s;
    client_body_timeout 60s;
    keepalive_timeout 65s;

    server {
        listen 192.168.0.1:8080 transparent reuseport;
        server_name _;
        set $cube_latency_ms 0;

        location / {
            access_by_lua_block {
                require("access_phase").decide()
                require("debug_dump").dump_request("http")
            }
            set $cube_audit_host $http_host;
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-For "";
            proxy_set_header X-Real-IP       "";
            proxy_set_header Forwarded       "";
            proxy_set_header X-Forwarded-Proto http;

            proxy_pass http://$server_addr:$server_port;
            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            header_filter_by_lua_block {
                require("debug_dump").dump_response_headers()
            }
        }
        log_by_lua_block {
            ngx.var.cube_latency_ms = math.floor(tonumber(ngx.var.request_time) * 1000)
            audit.write_one()
        }
    }

    server {
        listen 192.168.0.1:8443 ssl transparent reuseport;
        server_name _;
        ssl_certificate     /etc/cube/ca/placeholder.crt;
        ssl_certificate_key /etc/cube/ca/placeholder.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:cube_ssl:4m;
        ssl_session_timeout 1h;
        ssl_stapling off;
        ssl_certificate_by_lua_block {
            local ssl = require("ngx.ssl")
            local sni = ssl.server_name()
            local raw_addr, addr_type = ssl.raw_server_addr()
            local dst_ip
            if raw_addr and addr_type == "inet" and #raw_addr == 4 then
                dst_ip = string.format("%d.%d.%d.%d",
                    string.byte(raw_addr, 1), string.byte(raw_addr, 2),
                    string.byte(raw_addr, 3), string.byte(raw_addr, 4))
            end
            local ok, err = cert_signer.serve(sni, dst_ip)
            if not ok then
                ngx.log(ngx.ERR, "cert_signer failed: ", err,
                                 " sni=", tostring(sni),
                                 " dst=", tostring(dst_ip))
                pcall(function()
                    audit.write_tls_handshake_event(
                        sni, dst_ip,
                        "cert_signer_failed:" .. tostring(err))
                end)
                return ngx.exit(ngx.ERROR)
            end
        }
        set $cube_latency_ms 0;
        set_by_lua_block $cube_original_sni {
            return ngx.var.ssl_server_name or ""
        }
        location / {
            access_by_lua_block {
                require("access_phase").decide()
                require("debug_dump").dump_request("https")
            }
            set_by_lua_block $cube_audit_host {
                return ngx.var.ssl_server_name
                    or ngx.var.http_host
                    or ngx.var.server_addr
            }
            proxy_set_header Host $cube_audit_host;
            proxy_set_header X-Forwarded-For "";
            proxy_set_header X-Real-IP       "";
            proxy_set_header Forwarded       "";
            proxy_set_header X-Forwarded-Proto https;
            proxy_ssl_name $cube_original_sni;
            proxy_pass https://$server_addr:$server_port;
            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            header_filter_by_lua_block {
                require("debug_dump").dump_response_headers()
            }
        }
        log_by_lua_block {
            ngx.var.cube_latency_ms = math.floor(tonumber(ngx.var.request_time) * 1000)
            audit.write_one()
        }
    }

    server {
        listen 127.0.0.1:9090;
        server_name _;
        client_max_body_size 1m;
        client_body_buffer_size 64k;
        keepalive_timeout 5s;
        client_header_timeout 5s;
        client_body_timeout 5s;
        access_log off;
        location /admin/v1/ {
            content_by_lua_block {
                require("admin").dispatch()
            }
        }
        location / {
            return 404;
        }
    }
}
