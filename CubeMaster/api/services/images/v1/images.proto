syntax = "proto3";

package cubelet.services.images.v1;
import "api/services/errorcode/v1/errorcode.proto";
import "api/types/v1/images.proto";
option go_package = "github.com/tencentcloud/CubeSandbox/CubeMaster/api/services/images/v1;images";

// Service for handling image operations.
service Images {
  rpc CreateImage(CreateImageRequest) returns (CreateImageRequestResponse);
  // cubelet v1 not support list and destroy image
  rpc ListImages(CubeListImageRequest)returns (CubeListImageResponse);
  rpc DestroyImage(DestroyImageRequest) returns (DestroyImageResponse);
  rpc VolumeUtils(VolumUtilsRequest) returns (VolumUtilsResponse);
}

message CreateImageRequest{
  // requestID reqID
  string requestID     = 1;
  ImageSpec spec        = 2;
}

enum ImageStorageMediaType {
  // Docker means normal oci container images.should be pulled from dockerhub
  docker = 0;
  // image from local disk in ext4 format rootfs.
  ext4 = 1;
}

// ImageSpec is an internal representation of an image.
// ImageSpec defines the specification of an image
message ImageSpec {
  // Container's Image field (e.g. imageID or imageDigest).
  string image = 1;
  // annotations 传递username和token信息
  // ie. annotations["cube.image.username"] = xxx
  // ie. annotations["cube.image.token"] = xxx
  map<string, string> annotations = 2;

  // Type of storage media for the image (docker/ext4)
  string storage_media = 3;
  string namespace  = 6;
  string runtime_handler = 7;
}

// CreateImageRequestResponse contains the response for CreateImageRequest
message CreateImageRequestResponse{
  // Unique identifier matching the request
  string requestID     = 1;
  // Result of the operation
  cubelet.services.errorcode.v1.Ret ret   = 2;
}

// DestroyImageRequest destroy image
message DestroyImageRequest{
  // requestID reqID
  string requestID     = 1;
  ImageSpec spec        = 2;
}
// DestroyImageResponse destroy image
message DestroyImageResponse{
  // requestID reqID
  string requestID     = 1;
  // Ret.
  cubelet.services.errorcode.v1.Ret ret   = 2;
}
// VolumUtilsRequest volum utils
message VolumUtilsRequest {
  // requestID reqID
  string requestID     = 1;
  // cmd
  string cmd = 2;
  // input
  string input = 3;
}
// VolumUtilsResponse volum utils
message  VolumUtilsResponse {
   // requestID reqID
  string requestID     = 1;
  // Ret.
  cubelet.services.errorcode.v1.Ret ret   = 2;
  // output
  string output = 3;
}

message CubeListImageRequest {
  // requestID reqID
  string requestID     = 1;
  // Filter to list images.
  cubelet.types.ImageFilter filter = 2;
}

message CubeListImageResponse {
   // requestID reqID
  string requestID     = 1;
  
  // Ret.
  cubelet.services.errorcode.v1.Ret ret   = 2;

  // List of images.
  repeated cubelet.types.Image images = 3;
}

// Policy for pulling OCI objects. Possible values are:
	// Always: the kubelet always attempts to pull the reference. Container creation will fail If the pull fails.
	// Never: the kubelet never pulls the reference and only uses a local image or artifact. Container creation will fail if the reference isn't present.
	// IfNotPresent: the kubelet pulls if the reference isn't already present on disk. Container creation will fail if the reference isn't present and the pull fails.
	// Defaults to Always if :latest tag is specified, or IfNotPresent otherwise.
	// +optional
enum PullPolicy {
  // PullAlways means that kubelet always attempts to pull the latest image. Container will fail If the pull fails.
	Always = 0;
	// PullNever means that kubelet never pulls an image, but only uses a local image. Container will fail if the image isn't present
	Never = 1;
	// PullIfNotPresent means that kubelet pulls if the image isn't present on disk. Container will fail if the image isn't present and the pull fails.
	IfNotPresent = 2;
}

// ImageVolumeSource represents a image volume resource.
message ImageVolumeSource {
	// Required: Image or artifact reference to be used.
	ImageSpec reference = 1;

  PullPolicy pullPolicy = 2;
}